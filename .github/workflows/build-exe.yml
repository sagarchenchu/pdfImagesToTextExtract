name: Build Windows EXE

# ── Triggers ──────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "master"]
    paths:
      - "app.py"
      - "requirements.txt"
      - "handwriting_extractor.spec"
      - "rthooks/**"
      - "download_models.py"
      - ".github/workflows/build-exe.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "app.py"
      - "requirements.txt"
      - "handwriting_extractor.spec"
      - "rthooks/**"
  workflow_dispatch:          # allow manual trigger from GitHub UI
    inputs:
      create_release:
        description: "Create a GitHub Release with the EXE?"
        required: false
        default: "false"
        type: boolean

# ── Permissions ───────────────────────────────────────────────────────────
permissions:
  contents: write            # needed to create releases / upload assets

jobs:
  build:
    name: Build EXE on Windows
    runs-on: windows-latest
    # 120 minutes: pip install (~40 min) + model download (~40 min) + PyInstaller (~30 min).
    timeout-minutes: 120

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencies ──────────────────────────────────────────────────
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install application dependencies
        run: pip install -r requirements.txt
        timeout-minutes: 40

      - name: Install PyInstaller
        run: pip install pyinstaller>=6.3.0

      # ── Download ML models ────────────────────────────────────────────────
      # Downloads TrOCR (~1.35 GB) and EasyOCR (~250 MB) into models\trocr\
      # and models\easyocr\ so they can be zipped and attached to the release.
      - name: Download ML models
        run: python download_models.py
        timeout-minutes: 60

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller handwriting_extractor.spec --noconfirm
        timeout-minutes: 30
        env:
          # Suppress known third-party deprecation warnings that appear during
          # PyInstaller analysis but do not affect the built EXE:
          #  • timm.models.layers: EasyOCR uses the old timm API path; timm 1.x
          #    emits a FutureWarning but keeps the compat shim working.
          #  • torch.distributed: deprecated internal sharding modules that
          #    self-warn when analysed; excluded from the bundle via spec excludes.
          PYTHONWARNINGS: >-
            ignore::FutureWarning:timm.models.layers,
            ignore::DeprecationWarning:torch.distributed

      # ── Verify ────────────────────────────────────────────────────────
      - name: Verify EXE exists
        run: |
          if (Test-Path "dist\HandwritingExtractor\HandwritingExtractor.exe") {
            Write-Host "✅ EXE built successfully"
            Get-Item "dist\HandwritingExtractor\HandwritingExtractor.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Error "❌ EXE not found – build failed"
            exit 1
          }

      # ── Zip the output folder ─────────────────────────────────────────
      - name: Zip distribution folder
        run: |
          Set-Location dist
          & "C:\Program Files\7-Zip\7z.exe" a -tzip `
            "HandwritingExtractor-Windows-x64.zip" `
            "HandwritingExtractor"
          Set-Location ..
          Write-Host "Archive size:"
          Get-Item "dist\HandwritingExtractor-Windows-x64.zip" |
            Select-Object Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB,1)}}

      # ── Zip ML models ─────────────────────────────────────────────────
      # Split into two archives to stay well below GitHub's 2 GB asset limit.
      - name: Zip TrOCR models
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a -tzip `
            "dist\models-trocr.zip" `
            "models\trocr"
          Write-Host "models-trocr.zip size:"
          Get-Item "dist\models-trocr.zip" |
            Select-Object Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB,1)}}

      - name: Zip EasyOCR models
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a -tzip `
            "dist\models-easyocr.zip" `
            "models\easyocr"
          Write-Host "models-easyocr.zip size:"
          Get-Item "dist\models-easyocr.zip" |
            Select-Object Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB,1)}}

      # ── Upload as workflow artifact ───────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v5
        with:
          name: HandwritingExtractor-Windows-x64
          path: dist/HandwritingExtractor-Windows-x64.zip
          retention-days: 30
          if-no-files-found: error

      # ── Create / update a GitHub Release ─────────────────────────────
      # Runs when:
      #   • a version tag  (v*.*.*)  is pushed  → versioned release
      #   • push to main/master                 → rolling "latest" pre-release
      #   • the workflow is triggered manually with create_release=true
      - name: Get short commit SHA
        id: sha
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        run: echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: >-
            ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: >-
            ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Latest build ({0})', steps.sha.outputs.short) }}
          body: |
            ## Handwriting Text Extractor – Windows Build

            ### How to install

            1. Download **`HandwritingExtractor-Windows-x64.zip`** below and extract to a folder, e.g. `C:\HandwritingExtractor\`
            2. Download **`models-trocr.zip`** and **`models-easyocr.zip`** below
            3. Inside the extracted `HandwritingExtractor\` folder, create a `models\` sub-folder
            4. Extract `models-trocr.zip` — this gives you a `trocr\` folder; move it to `models\trocr\`
            5. Extract `models-easyocr.zip` — this gives you an `easyocr\` folder; move it to `models\easyocr\`

            The final layout should look like:

            ```
            HandwritingExtractor\
                HandwritingExtractor.exe
                models\
                    trocr\
                        config.json
                        pytorch_model.bin
                        …
                    easyocr\
                        craft_mlt_25k.pth
                        english_g2.pth
            ```

            6. Run **`HandwritingExtractor.exe`**

            ### What it does
            - Upload a **PDF** or **image** (PNG/JPG/TIFF/BMP/WebP)
            - Detects text regions with **EasyOCR** (layout detection)
            - Reads each handwritten line with **Microsoft TrOCR** (`trocr-large-handwritten`)
            - Shows live progress while extracting
            - Displays full results and lets you save them as a `.txt` file

            Built from commit: `${{ github.sha }}`
          files: |
            dist/HandwritingExtractor-Windows-x64.zip
            dist/models-trocr.zip
            dist/models-easyocr.zip
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
