name: Build Windows EXE

# ── Triggers ──────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "master"]
    paths:
      - "app.py"
      - "requirements.txt"
      - "handwriting_extractor.spec"
      - "rthooks/**"
      - ".github/workflows/build-exe.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "app.py"
      - "requirements.txt"
      - "handwriting_extractor.spec"
      - "rthooks/**"
  workflow_dispatch:          # allow manual trigger from GitHub UI
    inputs:
      create_release:
        description: "Create a GitHub Release with the EXE?"
        required: false
        default: "false"
        type: boolean

# ── Permissions ───────────────────────────────────────────────────────────
permissions:
  contents: write            # needed to create releases / upload assets

jobs:
  build:
    name: Build EXE on Windows
    runs-on: windows-latest
    # 60 minutes is enough now that ML models are no longer downloaded or
    # bundled during the build — only pip installs and PyInstaller remain.
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencies ──────────────────────────────────────────────────
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install application dependencies
        run: pip install -r requirements.txt
        timeout-minutes: 40

      - name: Install PyInstaller
        run: pip install pyinstaller>=6.3.0

      # ── Build ─────────────────────────────────────────────────────────
      # ML models are NOT downloaded or bundled here.
      # Users place a models\ folder next to the EXE after extracting.
      # See README.md for download links and the required folder layout.
      - name: Build with PyInstaller
        run: pyinstaller handwriting_extractor.spec --noconfirm
        timeout-minutes: 30

      # ── Verify ────────────────────────────────────────────────────────
      - name: Verify EXE exists
        run: |
          if (Test-Path "dist\HandwritingExtractor\HandwritingExtractor.exe") {
            Write-Host "✅ EXE built successfully"
            Get-Item "dist\HandwritingExtractor\HandwritingExtractor.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Error "❌ EXE not found – build failed"
            exit 1
          }

      # ── Zip the output folder ─────────────────────────────────────────
      - name: Zip distribution folder
        run: |
          Set-Location dist
          & "C:\Program Files\7-Zip\7z.exe" a -tzip `
            "HandwritingExtractor-Windows-x64.zip" `
            "HandwritingExtractor"
          Set-Location ..
          Write-Host "Archive size:"
          Get-Item "dist\HandwritingExtractor-Windows-x64.zip" |
            Select-Object Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB,1)}}

      # ── Upload as workflow artifact ───────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandwritingExtractor-Windows-x64
          path: dist/HandwritingExtractor-Windows-x64.zip
          retention-days: 30
          if-no-files-found: error

      # ── Create / update a GitHub Release ─────────────────────────────
      # Runs when:
      #   • a version tag  (v*.*.*)  is pushed  → versioned release
      #   • push to main/master                 → rolling "latest" pre-release
      #   • the workflow is triggered manually with create_release=true
      - name: Get short commit SHA
        id: sha
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        run: echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: >-
            ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: >-
            ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Latest build ({0})', steps.sha.outputs.short) }}
          body: |
            ## Handwriting Text Extractor – Windows Build

            ### How to install

            1. Download **`HandwritingExtractor-Windows-x64.zip`** below
            2. Extract to a folder, e.g. `C:\HandwritingExtractor\`
            3. Download the ML models (see links) and place them in a `models\` folder **next to** the EXE:

            ```
            HandwritingExtractor\
                HandwritingExtractor.exe
                models\
                    trocr\
                        config.json
                        generation_config.json
                        preprocessor_config.json
                        tokenizer_config.json
                        vocab.json
                        merges.txt
                        special_tokens_map.json
                        pytorch_model.bin          (~1.35 GB)
                    easyocr\
                        craft_mlt_25k.pth          (~90 MB)
                        english_g2.pth             (~160 MB)
            ```

            4. Run **`HandwritingExtractor.exe`**

            ### Model download links

            **TrOCR** (`microsoft/trocr-large-handwritten`) — place all files in `models\trocr\`:
            - [config.json](https://huggingface.co/microsoft/trocr-large-handwritten/resolve/main/config.json)
            - [generation_config.json](https://huggingface.co/microsoft/trocr-large-handwritten/resolve/main/generation_config.json)
            - [preprocessor_config.json](https://huggingface.co/microsoft/trocr-large-handwritten/resolve/main/preprocessor_config.json)
            - [tokenizer_config.json](https://huggingface.co/microsoft/trocr-large-handwritten/resolve/main/tokenizer_config.json)
            - [vocab.json](https://huggingface.co/microsoft/trocr-large-handwritten/resolve/main/vocab.json)
            - [merges.txt](https://huggingface.co/microsoft/trocr-large-handwritten/resolve/main/merges.txt)
            - [special_tokens_map.json](https://huggingface.co/microsoft/trocr-large-handwritten/resolve/main/special_tokens_map.json)
            - [pytorch_model.bin (~1.35 GB)](https://huggingface.co/microsoft/trocr-large-handwritten/resolve/main/pytorch_model.bin)

            **EasyOCR** — unzip each archive and place the `.pth` file in `models\easyocr\`:
            - [craft_mlt_25k.zip (~90 MB)](https://github.com/JaidedAI/EasyOCR/releases/download/pre-v1.1.6/craft_mlt_25k.zip)
            - [english_g2.zip (~160 MB)](https://github.com/JaidedAI/EasyOCR/releases/download/v1.3/english_g2.zip)

            ### What it does
            - Upload a **PDF** or **image** (PNG/JPG/TIFF/BMP/WebP)
            - Detects text regions with **EasyOCR** (layout detection)
            - Reads each handwritten line with **Microsoft TrOCR** (`trocr-large-handwritten`)
            - Shows live progress while extracting
            - Displays full results and lets you save them as a `.txt` file

            Built from commit: `${{ github.sha }}`
          files: dist/HandwritingExtractor-Windows-x64.zip
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
