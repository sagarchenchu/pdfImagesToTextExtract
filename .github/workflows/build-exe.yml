name: Build Windows EXE

# ── Triggers ──────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "master"]
    paths:
      - "app.py"
      - "api_server.py"
      - "requirements.txt"
      - "handwriting_extractor.spec"
      - "api_server.spec"
      - "rthooks/**"
      - ".github/workflows/build-exe.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "app.py"
      - "api_server.py"
      - "requirements.txt"
      - "handwriting_extractor.spec"
      - "api_server.spec"
      - "rthooks/**"
  workflow_dispatch:          # allow manual trigger from GitHub UI
    inputs:
      create_release:
        description: "Create a GitHub Release with the EXE?"
        required: false
        default: "false"
        type: boolean

# ── Permissions ───────────────────────────────────────────────────────────
permissions:
  contents: write            # needed to create releases / upload assets

jobs:
  build:
    name: Build EXE on Windows
    runs-on: windows-latest
    # 80 minutes: pip install (~40 min) + two PyInstaller builds (~30 min each).
    timeout-minutes: 80

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencies ──────────────────────────────────────────────────
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install application dependencies
        run: pip install -r requirements.txt
        timeout-minutes: 40

      - name: Install PyInstaller
        run: pip install pyinstaller>=6.3.0

      # ── Build GUI EXE ─────────────────────────────────────────────────
      - name: Build HandwritingExtractor with PyInstaller
        run: pyinstaller handwriting_extractor.spec --noconfirm
        timeout-minutes: 30
        env:
          # Suppress known third-party deprecation warnings that appear during
          # PyInstaller analysis but do not affect the built EXE:
          #  • timm.models.layers: EasyOCR uses the old timm API path; timm 1.x
          #    emits a FutureWarning but keeps the compat shim working.
          #  • torch.distributed: deprecated internal sharding modules that
          #    self-warn when analysed; excluded from the bundle via spec excludes.
          PYTHONWARNINGS: >-
            ignore::FutureWarning:timm.models.layers,
            ignore::DeprecationWarning:torch.distributed

      # ── Build API server EXE ──────────────────────────────────────────
      - name: Build TextExtractAPI with PyInstaller
        run: pyinstaller api_server.spec --noconfirm
        timeout-minutes: 30
        env:
          PYTHONWARNINGS: >-
            ignore::FutureWarning:timm.models.layers,
            ignore::DeprecationWarning:torch.distributed

      # ── Verify ────────────────────────────────────────────────────────
      - name: Verify EXEs exist
        run: |
          if (Test-Path "dist\HandwritingExtractor\HandwritingExtractor.exe") {
            Write-Host "✅ HandwritingExtractor.exe built successfully"
            Get-Item "dist\HandwritingExtractor\HandwritingExtractor.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Error "❌ HandwritingExtractor.exe not found – build failed"
            exit 1
          }
          if (Test-Path "dist\TextExtractAPI\TextExtractAPI.exe") {
            Write-Host "✅ TextExtractAPI.exe built successfully"
            Get-Item "dist\TextExtractAPI\TextExtractAPI.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Error "❌ TextExtractAPI.exe not found – build failed"
            exit 1
          }

      # ── Zip the output folders ────────────────────────────────────────
      - name: Zip distribution folders
        run: |
          Set-Location dist
          & "C:\Program Files\7-Zip\7z.exe" a -tzip `
            "HandwritingExtractor-Windows-x64.zip" `
            "HandwritingExtractor"
          & "C:\Program Files\7-Zip\7z.exe" a -tzip `
            "TextExtractAPI-Windows-x64.zip" `
            "TextExtractAPI"
          Set-Location ..
          Write-Host "Archive sizes:"
          Get-Item "dist\HandwritingExtractor-Windows-x64.zip" |
            Select-Object Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB,1)}}
          Get-Item "dist\TextExtractAPI-Windows-x64.zip" |
            Select-Object Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB,1)}}

      # ── Upload as workflow artifacts ──────────────────────────────────
      - name: Upload HandwritingExtractor artifact
        uses: actions/upload-artifact@v5
        with:
          name: HandwritingExtractor-Windows-x64
          path: dist/HandwritingExtractor-Windows-x64.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload TextExtractAPI artifact
        uses: actions/upload-artifact@v5
        with:
          name: TextExtractAPI-Windows-x64
          path: dist/TextExtractAPI-Windows-x64.zip
          retention-days: 30
          if-no-files-found: error

      # ── Create / update a GitHub Release ─────────────────────────────
      # Runs when:
      #   • a version tag  (v*.*.*)  is pushed  → versioned release
      #   • push to main/master                 → rolling "latest" pre-release
      #   • the workflow is triggered manually with create_release=true
      - name: Get short commit SHA
        id: sha
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        run: echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: >-
            ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: >-
            ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Latest build ({0})', steps.sha.outputs.short) }}
          body: |
            ## Handwriting Text Extractor – Windows Build

            ### How to install

            1. Download **`HandwritingExtractor-Windows-x64.zip`** below and extract to a folder, e.g. `C:\HandwritingExtractor\`
            2. Run **`HandwritingExtractor.exe`**

            ### API Server (headless)

            1. Download **`TextExtractAPI-Windows-x64.zip`** and extract it.
            2. Run **`TextExtractAPI.exe`** — it starts a local HTTP server on port **9102**.
            3. Send a PDF or image to the endpoint:
               ```
               POST http://127.0.0.1:9102/extractText
               Content-Type: multipart/form-data
               Body field: file=<your PDF or image>
               ```
               Example with curl:
               ```
               curl -X POST http://127.0.0.1:9102/extractText -F "file=@document.pdf"
               ```
            4. The response body is the extracted text (UTF-8 plain text).

            > **Note:** ML models (TrOCR ~1 GB, EasyOCR ~250 MB) are downloaded automatically on first use and cached in `%USERPROFILE%\.cache\`.

            ### What it does
            - Upload a **PDF** or **image** (PNG/JPG/TIFF/BMP/WebP)
            - Detects text regions with **EasyOCR** (layout detection)
            - Reads each handwritten line with **Microsoft TrOCR** (`trocr-large-handwritten`)
            - Shows live progress while extracting
            - Displays full results and lets you save them as a `.txt` file

            Built from commit: `${{ github.sha }}`
          files: |
            dist/HandwritingExtractor-Windows-x64.zip
            dist/TextExtractAPI-Windows-x64.zip
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
