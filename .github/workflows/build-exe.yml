name: Build Windows EXE

# ── Triggers ──────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "master"]
    paths:
      - "app.py"
      - "requirements.txt"
      - "handwriting_extractor.spec"
      - "download_models.py"
      - ".github/workflows/build-exe.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "app.py"
      - "requirements.txt"
      - "handwriting_extractor.spec"
      - "download_models.py"
  workflow_dispatch:          # allow manual trigger from GitHub UI
    inputs:
      create_release:
        description: "Create a GitHub Release with the EXE?"
        required: false
        default: "false"
        type: boolean

# ── Permissions ───────────────────────────────────────────────────────────
permissions:
  contents: write            # needed to create releases / upload assets

jobs:
  build:
    name: Build EXE on Windows
    runs-on: windows-latest
    timeout-minutes: 150     # model downloads (~1.25 GB) + PyInstaller can be slow

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencies ──────────────────────────────────────────────────
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install application dependencies
        run: pip install -r requirements.txt
        timeout-minutes: 40

      - name: Install PyInstaller
        run: pip install pyinstaller>=6.3.0

      # ── Download ML models for offline bundling ───────────────────────
      - name: Download ML models for bundling
        run: python download_models.py
        timeout-minutes: 40

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller handwriting_extractor.spec --noconfirm
        timeout-minutes: 30

      # ── Verify ────────────────────────────────────────────────────────
      - name: Verify EXE exists
        run: |
          if (Test-Path "dist\HandwritingExtractor\HandwritingExtractor.exe") {
            Write-Host "✅ EXE built successfully"
            Get-Item "dist\HandwritingExtractor\HandwritingExtractor.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Error "❌ EXE not found – build failed"
            exit 1
          }

      # ── Zip the output folder as two independent standard zip files ───
      # We produce two plain .zip files (no splitting) so users can extract
      # each one with Windows Explorer's built-in "Extract All" — no 7-Zip
      # or any third-party tool required.
      #
      #   app.zip    – EXE + all DLLs/Python files (everything except models)
      #   models.zip – the bundled ML models directory only
      #
      # Both archives use the same internal root path (HandwritingExtractor\)
      # so extracting them to the same parent folder produces one complete
      # HandwritingExtractor\ directory.  7-Zip is pre-installed on
      # windows-latest and is used here only to build the archives on CI.
      #
      # PyInstaller 6.x places data files under _internal\ inside the output
      # folder, so bundled models live at:
      #   HandwritingExtractor\_internal\models\
      - name: Verify models directory exists in dist
        run: |
          $modelsPath = "dist\HandwritingExtractor\_internal\models"
          if (Test-Path $modelsPath) {
            Write-Host "✅ Models directory found at $modelsPath"
            Get-ChildItem $modelsPath | Select-Object Name, LastWriteTime
          } else {
            Write-Error "❌ Models directory not found at $modelsPath – check PyInstaller output layout"
            Get-ChildItem "dist\HandwritingExtractor" -Depth 2 | Select-Object FullName
            exit 1
          }

      - name: Zip distribution folder (two independent standard zip files)
        run: |
          Set-Location dist

          # models archive – HandwritingExtractor\_internal\models\...
          # (PyInstaller 6.x places datas inside _internal\)
          & "C:\Program Files\7-Zip\7z.exe" a -tzip `
            "HandwritingExtractor-Windows-x64-models.zip" `
            "HandwritingExtractor\_internal\models"

          # app archive – HandwritingExtractor\*.exe, *.dll, *.pyd, etc.
          # -xr!models excludes the models sub-folder wherever it appears
          & "C:\Program Files\7-Zip\7z.exe" a -tzip `
            "HandwritingExtractor-Windows-x64-app.zip" `
            "HandwritingExtractor" "-xr!models"

          Set-Location ..

          Write-Host "Archive sizes:"
          Get-ChildItem "dist\HandwritingExtractor-Windows-x64-*.zip" |
            Select-Object Name, @{n='SizeMB';e={[math]::Round($_.Length/1MB,1)}}

      # ── Upload as workflow artifact ───────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandwritingExtractor-Windows-x64
          path: dist/HandwritingExtractor-Windows-x64-*.zip
          retention-days: 30
          if-no-files-found: error

      # ── Create / update a GitHub Release ─────────────────────────────
      # Runs when:
      #   • a version tag  (v*.*.*)  is pushed  → versioned release
      #   • push to main/master                 → rolling "latest" pre-release
      #   • the workflow is triggered manually with create_release=true
      - name: Get short commit SHA
        id: sha
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        run: echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: >-
            ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: >-
            ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Latest build ({0})', steps.sha.outputs.short) }}
          body: |
            ## Handwriting Text Extractor – Windows Build

            ### How to install (no 7-Zip needed)
            1. Download **both** files below:
               - `HandwritingExtractor-Windows-x64-app.zip` – the application (EXE + libraries)
               - `HandwritingExtractor-Windows-x64-models.zip` – the bundled ML models
            2. Create a folder anywhere, e.g. `C:\HandwritingExtractor\`
            3. Right-click `HandwritingExtractor-Windows-x64-app.zip` → **Extract All…** → extract to that folder
            4. Right-click `HandwritingExtractor-Windows-x64-models.zip` → **Extract All…** → extract to the **same** folder
               *(Windows will merge the `HandwritingExtractor` sub-folder automatically)*
            5. Open `HandwritingExtractor\` and run **HandwritingExtractor.exe**

            > **No internet connection required.**  ML models are bundled inside
            > the distribution folder — the app works fully offline.

            ### What it does
            - Upload a **PDF** or **image** (PNG/JPG/TIFF/BMP/WebP)
            - Detects text regions with **EasyOCR** (layout detection)
            - Reads each handwritten line with **Microsoft TrOCR** (`trocr-large-handwritten`)
            - Shows live progress while extracting
            - Displays full results and lets you save them as a `.txt` file

            Built from commit: `${{ github.sha }}`
          files: dist/HandwritingExtractor-Windows-x64-*.zip
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
